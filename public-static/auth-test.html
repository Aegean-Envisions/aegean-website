<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auth Test - Aegean Envisions</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 40px; }
        .debug { background: #f0f0f0; padding: 20px; margin: 20px 0; border-radius: 8px; }
        button { padding: 15px 30px; background: #0d5eaf; color: white; border: none; border-radius: 8px; cursor: pointer; margin: 10px; }
        button:hover { background: #094a94; }
        .success { color: green; } 
        .error { color: red; }
        .info { color: blue; }
    </style>
</head>
<body>
    <h1>Authentication Test Page</h1>
    
    <div class="debug">
        <h3>Current Session Status:</h3>
        <p id="authStatus">Checking...</p>
        <p id="userInfo">Checking user info...</p>
        <p id="msalInfo">Checking MSAL info...</p>
    </div>

    <div>
        <button onclick="testLogin()">Test Login</button>
        <button onclick="checkCurrentAuth()">Check Auth Status</button>
        <button onclick="clearSession()">Clear Session</button>
        <button onclick="goToPortal()">Go to Portal</button>
    </div>

    <div class="debug">
        <h3>Debug Log:</h3>
        <div id="debugLog"></div>
    </div>

    <script src="https://alcdn.msauth.net/browser/2.38.0/js/msal-browser.min.js"></script>
    <script src="js/auth.js"></script>
    <script>
        function log(message, type = 'info') {
            const logDiv = document.getElementById('debugLog');
            const timestamp = new Date().toLocaleTimeString();
            logDiv.innerHTML += `<p class="${type}">[${timestamp}] ${message}</p>`;
            console.log(message);
        }

        function updateStatus() {
            const isAuth = sessionStorage.getItem("isAuthenticated");
            const userEmail = sessionStorage.getItem("userEmail");
            const msalAccount = sessionStorage.getItem("msalAccount");
            
            document.getElementById('authStatus').innerHTML = 
                `<strong>Is Authenticated:</strong> ${isAuth || 'null'} (${typeof isAuth})`;
            
            document.getElementById('userInfo').innerHTML = 
                `<strong>User Email:</strong> ${userEmail || 'null'}`;
                
            document.getElementById('msalInfo').innerHTML = 
                `<strong>MSAL Account:</strong> ${msalAccount ? 'Present' : 'null'}`;
        }

        async function testLogin() {
            log('Starting test login...', 'info');
            try {
                await login();
                log('Login function completed', 'success');
                setTimeout(updateStatus, 1000);
            } catch (error) {
                log(`Login error: ${error.message}`, 'error');
            }
        }

        async function checkCurrentAuth() {
            log('Checking current auth status...', 'info');
            try {
                const result = await checkAuth();
                log(`Auth check result: ${result}`, result ? 'success' : 'error');
                updateStatus();
            } catch (error) {
                log(`Auth check error: ${error.message}`, 'error');
            }
        }

        function clearSession() {
            sessionStorage.clear();
            log('Session cleared', 'info');
            updateStatus();
        }

        function goToPortal() {
            window.location.href = '/portal.html';
        }

        // Initialize
        window.onload = function() {
            log('Page loaded, checking initial status...', 'info');
            updateStatus();
        };
    </script>
</body>
</html>
