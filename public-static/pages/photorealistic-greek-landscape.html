<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photorealistic Greek Landscape - Particle Enhanced</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow: hidden;
            font-family: 'Arial', sans-serif;
            background: #000;
        }

        .landscape-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
        }

        .photo-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            transition: opacity 2s ease-in-out;
        }

        .parthenon-layer {
            background-image: url('https://images.unsplash.com/photo-1555993539-1732b0258235?ixlib=rb-4.0.3&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D&auto=format&fit=crop&w=2070&q=80');
            z-index: 1;
        }

        .mediterranean-layer {
            background-image: url('https://images.unsplash.com/photo-1613395877344-13d4a8e0d49e?ixlib=rb-4.0.3&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D&auto=format&fit=crop&w=2070&q=80');
            z-index: 1;
            opacity: 0;
        }

        .olive-grove-layer {
            background-image: url('https://images.unsplash.com/photo-1571115764595-644a1f56a55c?ixlib=rb-4.0.3&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D&auto=format&fit=crop&w=2070&q=80');
            z-index: 1;
            opacity: 0;
        }

        .santorini-layer {
            background-image: url('https://images.unsplash.com/photo-1570077188670-e3a8d69ac5ff?ixlib=rb-4.0.3&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D&auto=format&fit=crop&w=2069&q=80');
            z-index: 1;
            opacity: 0;
        }

        .particle-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 2;
        }

        .controls {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 10;
            background: rgba(30, 58, 138, 0.8);
            padding: 15px;
            border-radius: 10px;
            color: white;
            font-size: 14px;
        }

        .scene-button {
            background: linear-gradient(135deg, #1e3a8a, #3b82f6);
            color: white;
            border: none;
            padding: 8px 16px;
            margin: 2px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.3s ease;
        }

        .scene-button:hover {
            background: linear-gradient(135deg, #3b82f6, #60a5fa);
            transform: translateY(-2px);
        }

        .scene-button.active {
            background: linear-gradient(135deg, #60a5fa, #93c5fd);
            box-shadow: 0 0 20px rgba(96, 165, 250, 0.5);
        }

        .particle-toggle {
            background: linear-gradient(135deg, #059669, #10b981);
            color: white;
            border: none;
            padding: 8px 16px;
            margin: 2px 0;
            border-radius: 5px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.3s ease;
            display: block;
            width: 100%;
        }

        .particle-toggle:hover {
            background: linear-gradient(135deg, #10b981, #34d399);
        }

        .particle-toggle.disabled {
            background: linear-gradient(135deg, #6b7280, #9ca3af);
        }

        .atmospheric-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at center, transparent 0%, rgba(30, 58, 138, 0.1) 70%, rgba(30, 58, 138, 0.2) 100%);
            z-index: 3;
            pointer-events: none;
        }

        .info-panel {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 15px;
            border-radius: 10px;
            font-size: 12px;
            max-width: 300px;
            z-index: 10;
        }
    </style>
</head>
<body>
    <div class="landscape-container">
        <!-- Photo Layers -->
        <div class="photo-layer parthenon-layer" id="parthenon"></div>
        <div class="photo-layer mediterranean-layer" id="mediterranean"></div>
        <div class="photo-layer olive-grove-layer" id="oliveGrove"></div>
        <div class="photo-layer santorini-layer" id="santorini"></div>
        
        <!-- Particle Canvas Layers -->
        <canvas class="particle-canvas" id="dustParticles"></canvas>
        <canvas class="particle-canvas" id="pollenParticles"></canvas>
        <canvas class="particle-canvas" id="seaSprayParticles"></canvas>
        <canvas class="particle-canvas" id="lightRayParticles"></canvas>
        <canvas class="particle-canvas" id="atmosphericParticles"></canvas>
        
        <!-- Atmospheric Overlay -->
        <div class="atmospheric-overlay"></div>
    </div>

    <!-- Controls -->
    <div class="controls">
        <div style="margin-bottom: 10px; font-weight: bold;">Greek Landscapes</div>
        <button class="scene-button active" onclick="switchScene('parthenon')">Parthenon</button>
        <button class="scene-button" onclick="switchScene('mediterranean')">Mediterranean Sea</button>
        <button class="scene-button" onclick="switchScene('oliveGrove')">Olive Grove</button>
        <button class="scene-button" onclick="switchScene('santorini')">Santorini</button>
        
        <div style="margin: 15px 0 10px 0; font-weight: bold;">Particle Effects</div>
        <button class="particle-toggle" id="dustToggle" onclick="toggleParticles('dust')">Dust Particles</button>
        <button class="particle-toggle" id="pollenToggle" onclick="toggleParticles('pollen')">Pollen</button>
        <button class="particle-toggle" id="seaSprayToggle" onclick="toggleParticles('seaSpray')">Sea Spray</button>
        <button class="particle-toggle" id="lightRayToggle" onclick="toggleParticles('lightRay')">Light Rays</button>
        <button class="particle-toggle" id="atmosphericToggle" onclick="toggleParticles('atmospheric')">Atmosphere</button>
    </div>

    <!-- Info Panel -->
    <div class="info-panel">
        <strong>Photorealistic Greek Landscapes</strong><br>
        Real photography enhanced with sophisticated particle physics.<br><br>
        <span id="sceneInfo">The Parthenon - Ancient temple complex on the Athenian Acropolis, featuring atmospheric dust particles and golden light rays.</span>
    </div>

    <script>
        // Global variables
        let currentScene = 'parthenon';
        const particleSystems = {};
        const activeParticles = {
            dust: true,
            pollen: false,
            seaSpray: false,
            lightRay: true,
            atmospheric: true
        };

        // Scene information
        const sceneInfo = {
            parthenon: "The Parthenon - Ancient temple complex on the Athenian Acropolis, featuring atmospheric dust particles and golden light rays.",
            mediterranean: "Mediterranean Coastline - Crystal clear waters of the Aegean Sea with sea spray particles and coastal atmosphere.",
            oliveGrove: "Olive Grove - Ancient olive trees in Greek countryside with floating pollen particles and Mediterranean breeze effects.",
            santorini: "Santorini Sunset - Iconic white buildings overlooking the caldera with atmospheric particles and golden hour lighting."
        };

        // Initialize canvases and contexts
        function initializeCanvases() {
            const canvases = ['dustParticles', 'pollenParticles', 'seaSprayParticles', 'lightRayParticles', 'atmosphericParticles'];
            
            canvases.forEach(canvasId => {
                const canvas = document.getElementById(canvasId);
                const ctx = canvas.getContext('2d');
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
                
                particleSystems[canvasId] = {
                    canvas: canvas,
                    ctx: ctx,
                    particles: []
                };
            });
        }

        // Particle class definitions
        class DustParticle {
            constructor(canvas) {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.vx = (Math.random() - 0.5) * 0.5;
                this.vy = (Math.random() - 0.5) * 0.3;
                this.size = Math.random() * 2 + 0.5;
                this.opacity = Math.random() * 0.6 + 0.2;
                this.life = Math.random() * 300 + 200;
                this.maxLife = this.life;
                this.color = this.getBlueShade();
            }

            getBlueShade() {
                const blues = ['#1e3a8a', '#3b82f6', '#60a5fa', '#93c5fd'];
                return blues[Math.floor(Math.random() * blues.length)];
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.life--;
                this.opacity = (this.life / this.maxLife) * 0.6;

                if (this.x < 0 || this.x > window.innerWidth) this.vx *= -1;
                if (this.y < 0 || this.y > window.innerHeight) this.vy *= -1;

                return this.life > 0;
            }

            draw(ctx) {
                ctx.save();
                ctx.globalAlpha = this.opacity;
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }

        class PollenParticle {
            constructor(canvas) {
                this.x = Math.random() * canvas.width;
                this.y = canvas.height + 10;
                this.vx = (Math.random() - 0.5) * 1;
                this.vy = -Math.random() * 2 - 1;
                this.size = Math.random() * 3 + 1;
                this.opacity = Math.random() * 0.8 + 0.3;
                this.rotation = 0;
                this.rotationSpeed = (Math.random() - 0.5) * 0.1;
                this.color = '#60a5fa';
            }

            update() {
                this.x += this.vx + Math.sin(Date.now() * 0.001 + this.x * 0.01) * 0.5;
                this.y += this.vy;
                this.rotation += this.rotationSpeed;
                
                return this.y > -10;
            }

            draw(ctx) {
                ctx.save();
                ctx.globalAlpha = this.opacity;
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation);
                ctx.fillStyle = this.color;
                ctx.fillRect(-this.size/2, -this.size/2, this.size, this.size);
                ctx.restore();
            }
        }

        class SeaSprayParticle {
            constructor(canvas) {
                this.x = Math.random() * canvas.width;
                this.y = canvas.height * 0.7 + Math.random() * canvas.height * 0.3;
                this.vx = (Math.random() - 0.5) * 3;
                this.vy = -Math.random() * 4 - 2;
                this.gravity = 0.1;
                this.size = Math.random() * 2 + 1;
                this.opacity = Math.random() * 0.7 + 0.3;
                this.life = Math.random() * 100 + 50;
                this.maxLife = this.life;
                this.color = '#3b82f6';
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.vy += this.gravity;
                this.life--;
                this.opacity = (this.life / this.maxLife) * 0.7;

                return this.life > 0 && this.y < window.innerHeight;
            }

            draw(ctx) {
                ctx.save();
                ctx.globalAlpha = this.opacity;
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }

        class LightRayParticle {
            constructor(canvas) {
                this.x = Math.random() * canvas.width;
                this.y = 0;
                this.width = Math.random() * 3 + 1;
                this.height = canvas.height;
                this.opacity = Math.random() * 0.1 + 0.05;
                this.angle = (Math.random() - 0.5) * 0.2;
                this.color = '#60a5fa';
                this.pulseSpeed = Math.random() * 0.02 + 0.01;
                this.pulseOffset = Math.random() * Math.PI * 2;
            }

            update() {
                const pulse = Math.sin(Date.now() * this.pulseSpeed + this.pulseOffset);
                this.opacity = (pulse + 1) * 0.05 + 0.02;
                return true;
            }

            draw(ctx) {
                ctx.save();
                ctx.globalAlpha = this.opacity;
                ctx.translate(this.x, this.y);
                ctx.rotate(this.angle);
                
                const gradient = ctx.createLinearGradient(0, 0, 0, this.height);
                gradient.addColorStop(0, this.color);
                gradient.addColorStop(1, 'transparent');
                
                ctx.fillStyle = gradient;
                ctx.fillRect(-this.width/2, 0, this.width, this.height);
                ctx.restore();
            }
        }

        class AtmosphericParticle {
            constructor(canvas) {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.vx = (Math.random() - 0.5) * 0.2;
                this.vy = (Math.random() - 0.5) * 0.2;
                this.size = Math.random() * 4 + 2;
                this.opacity = Math.random() * 0.3 + 0.1;
                this.pulseSpeed = Math.random() * 0.01 + 0.005;
                this.pulseOffset = Math.random() * Math.PI * 2;
                this.color = '#1e3a8a';
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
                
                const pulse = Math.sin(Date.now() * this.pulseSpeed + this.pulseOffset);
                this.opacity = (pulse + 1) * 0.15 + 0.05;

                if (this.x < 0) this.x = window.innerWidth;
                if (this.x > window.innerWidth) this.x = 0;
                if (this.y < 0) this.y = window.innerHeight;
                if (this.y > window.innerHeight) this.y = 0;

                return true;
            }

            draw(ctx) {
                ctx.save();
                ctx.globalAlpha = this.opacity;
                const gradient = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.size);
                gradient.addColorStop(0, this.color);
                gradient.addColorStop(1, 'transparent');
                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }

        // Particle system management
        function createParticles(systemName, ParticleClass, count) {
            const system = particleSystems[systemName + 'Particles'];
            if (!system) return;

            for (let i = 0; i < count; i++) {
                system.particles.push(new ParticleClass(system.canvas));
            }
        }

        function updateParticles(systemName) {
            const system = particleSystems[systemName + 'Particles'];
            if (!system || !activeParticles[systemName]) return;

            system.ctx.clearRect(0, 0, system.canvas.width, system.canvas.height);
            
            system.particles = system.particles.filter(particle => {
                const alive = particle.update();
                if (alive) {
                    particle.draw(system.ctx);
                }
                return alive;
            });

            // Replenish particles
            const targetCount = getTargetParticleCount(systemName);
            while (system.particles.length < targetCount) {
                system.particles.push(createParticleByType(systemName, system.canvas));
            }
        }

        function getTargetParticleCount(systemName) {
            const counts = {
                dust: 100,
                pollen: 50,
                seaSpray: currentScene === 'mediterranean' ? 80 : 20,
                lightRay: 15,
                atmospheric: 60
            };
            return counts[systemName] || 50;
        }

        function createParticleByType(systemName, canvas) {
            const particleTypes = {
                dust: DustParticle,
                pollen: PollenParticle,
                seaSpray: SeaSprayParticle,
                lightRay: LightRayParticle,
                atmospheric: AtmosphericParticle
            };
            return new particleTypes[systemName](canvas);
        }

        // Scene switching
        function switchScene(sceneName) {
            // Update active scene
            currentScene = sceneName;
            
            // Update button states
            document.querySelectorAll('.scene-button').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            
            // Update scene info
            document.getElementById('sceneInfo').textContent = sceneInfo[sceneName];
            
            // Hide all layers
            document.querySelectorAll('.photo-layer').forEach(layer => {
                layer.style.opacity = '0';
            });
            
            // Show selected layer
            setTimeout(() => {
                document.getElementById(sceneName).style.opacity = '1';
            }, 100);

            // Adjust particle systems based on scene
            adjustParticlesForScene(sceneName);
        }

        function adjustParticlesForScene(sceneName) {
            // Clear existing particles
            Object.keys(particleSystems).forEach(systemName => {
                if (particleSystems[systemName]) {
                    particleSystems[systemName].particles = [];
                }
            });

            // Adjust active particles based on scene
            switch(sceneName) {
                case 'parthenon':
                    activeParticles.dust = true;
                    activeParticles.pollen = false;
                    activeParticles.seaSpray = false;
                    activeParticles.lightRay = true;
                    activeParticles.atmospheric = true;
                    break;
                case 'mediterranean':
                    activeParticles.dust = false;
                    activeParticles.pollen = false;
                    activeParticles.seaSpray = true;
                    activeParticles.lightRay = true;
                    activeParticles.atmospheric = true;
                    break;
                case 'oliveGrove':
                    activeParticles.dust = false;
                    activeParticles.pollen = true;
                    activeParticles.seaSpray = false;
                    activeParticles.lightRay = true;
                    activeParticles.atmospheric = true;
                    break;
                case 'santorini':
                    activeParticles.dust = true;
                    activeParticles.pollen = false;
                    activeParticles.seaSpray = false;
                    activeParticles.lightRay = true;
                    activeParticles.atmospheric = true;
                    break;
            }

            updateParticleToggles();
        }

        // Particle toggling
        function toggleParticles(particleType) {
            activeParticles[particleType] = !activeParticles[particleType];
            updateParticleToggles();
            
            if (!activeParticles[particleType]) {
                // Clear particles when disabled
                const systemName = particleType + 'Particles';
                if (particleSystems[systemName]) {
                    particleSystems[systemName].ctx.clearRect(0, 0, particleSystems[systemName].canvas.width, particleSystems[systemName].canvas.height);
                }
            }
        }

        function updateParticleToggles() {
            Object.keys(activeParticles).forEach(particleType => {
                const toggle = document.getElementById(particleType + 'Toggle');
                if (toggle) {
                    if (activeParticles[particleType]) {
                        toggle.classList.remove('disabled');
                    } else {
                        toggle.classList.add('disabled');
                    }
                }
            });
        }

        // Animation loop
        function animate() {
            // Update all particle systems
            Object.keys(activeParticles).forEach(systemName => {
                updateParticles(systemName);
            });
            
            requestAnimationFrame(animate);
        }

        // Window resize handler
        function handleResize() {
            Object.keys(particleSystems).forEach(systemName => {
                const system = particleSystems[systemName];
                if (system) {
                    system.canvas.width = window.innerWidth;
                    system.canvas.height = window.innerHeight;
                }
            });
        }

        // Initialize everything
        function init() {
            initializeCanvases();
            
            // Initialize particles for default scene
            Object.keys(activeParticles).forEach(systemName => {
                createParticles(systemName, createParticleByType(systemName, particleSystems[systemName + 'Particles'].canvas), getTargetParticleCount(systemName));
            });

            updateParticleToggles();
            animate();
            
            // Set up resize listener
            window.addEventListener('resize', handleResize);
        }

        // Start the experience
        window.addEventListener('load', init);

        // Preload images for smooth transitions
        const imageUrls = [
            'https://images.unsplash.com/photo-1555993539-1732b0258235?ixlib=rb-4.0.3&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D&auto=format&fit=crop&w=2070&q=80',
            'https://images.unsplash.com/photo-1613395877344-13d4a8e0d49e?ixlib=rb-4.0.3&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D&auto=format&fit=crop&w=2070&q=80',
            'https://images.unsplash.com/photo-1571115764595-644a1f56a55c?ixlib=rb-4.0.3&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D&auto=format&fit=crop&w=2070&q=80',
            'https://images.unsplash.com/photo-1570077188670-e3a8d69ac5ff?ixlib=rb-4.0.3&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D&auto=format&fit=crop&w=2069&q=80'
        ];

        imageUrls.forEach(url => {
            const img = new Image();
            img.src = url;
        });
    </script>
</body>
</html>
