<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photorealistic Greek Landscape - Morphing Shapes</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow: hidden;
            background: linear-gradient(135deg, #1e3a8a, #3b82f6, #60a5fa);
            font-family: 'Georgia', serif;
        }

        .container {
            position: relative;
            width: 100vw;
            height: 100vh;
        }

        /* Base photo layers with morphing clip-paths */
        .photo-layer {
            position: absolute;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            mix-blend-mode: multiply;
        }

        .photo-layer::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(45deg, 
                rgba(30, 58, 138, 0.3) 0%, 
                rgba(59, 130, 246, 0.2) 50%, 
                rgba(96, 165, 250, 0.1) 100%);
            z-index: 1;
        }

        /* Santorini cliffs morphing */
        .santorini-cliffs {
            background-image: url('https://images.unsplash.com/photo-1570077188670-e3a8d69ac5ff?w=1920&h=1080&fit=crop');
            clip-path: polygon(0% 0%, 100% 0%, 80% 100%, 0% 85%);
            animation: morphCliffs 12s ease-in-out infinite;
            z-index: 5;
        }

        @keyframes morphCliffs {
            0%, 100% { 
                clip-path: polygon(0% 0%, 100% 0%, 80% 100%, 0% 85%);
                transform: scale(1.05) rotate(0deg);
            }
            25% { 
                clip-path: polygon(0% 0%, 85% 15%, 95% 100%, 20% 90%);
                transform: scale(1.1) rotate(0.5deg);
            }
            50% { 
                clip-path: polygon(15% 0%, 100% 10%, 100% 100%, 0% 75%);
                transform: scale(1.08) rotate(-0.5deg);
            }
            75% { 
                clip-path: polygon(0% 20%, 90% 0%, 75% 85%, 10% 100%);
                transform: scale(1.12) rotate(0.3deg);
            }
        }

        /* Athens Acropolis */
        .athens-acropolis {
            background-image: url('https://images.unsplash.com/photo-1555993539-1732b0258df5?w=1920&h=1080&fit=crop');
            clip-path: circle(40% at 60% 40%);
            animation: morphAcropolis 15s ease-in-out infinite;
            z-index: 4;
        }

        @keyframes morphAcropolis {
            0%, 100% { 
                clip-path: circle(40% at 60% 40%);
                transform: scale(1) translateX(0);
            }
            20% { 
                clip-path: ellipse(50% 35% at 70% 50%);
                transform: scale(1.05) translateX(-20px);
            }
            40% { 
                clip-path: polygon(30% 0%, 90% 20%, 80% 80%, 10% 90%);
                transform: scale(1.1) translateX(30px);
            }
            60% { 
                clip-path: ellipse(45% 60% at 40% 30%);
                transform: scale(1.08) translateX(-10px);
            }
            80% { 
                clip-path: circle(45% at 50% 60%);
                transform: scale(1.03) translateX(15px);
            }
        }

        /* Aegean Sea waters */
        .aegean-waters {
            background-image: url('https://images.unsplash.com/photo-1544551763-46a013bb70d5?w=1920&h=1080&fit=crop');
            clip-path: polygon(0% 50%, 100% 30%, 100% 100%, 0% 100%);
            animation: morphWaters 18s ease-in-out infinite;
            z-index: 3;
        }

        @keyframes morphWaters {
            0%, 100% { 
                clip-path: polygon(0% 50%, 100% 30%, 100% 100%, 0% 100%);
                transform: scaleY(1);
            }
            16.66% { 
                clip-path: polygon(0% 60%, 80% 35%, 100% 100%, 20% 100%);
                transform: scaleY(1.1);
            }
            33.33% { 
                clip-path: polygon(20% 45%, 100% 40%, 90% 100%, 0% 95%);
                transform: scaleY(1.05);
            }
            50% { 
                clip-path: polygon(0% 35%, 90% 50%, 100% 100%, 10% 100%);
                transform: scaleY(1.15);
            }
            66.66% { 
                clip-path: polygon(10% 55%, 100% 25%, 85% 100%, 0% 100%);
                transform: scaleY(1.08);
            }
            83.33% { 
                clip-path: polygon(0% 45%, 85% 45%, 100% 100%, 15% 100%);
                transform: scaleY(1.12);
            }
        }

        /* Mykonos windmills */
        .mykonos-windmills {
            background-image: url('https://images.unsplash.com/photo-1601581875309-fafbf2d3ed3a?w=1920&h=1080&fit=crop');
            clip-path: polygon(20% 20%, 80% 0%, 90% 60%, 10% 80%);
            animation: morphWindmills 20s ease-in-out infinite;
            z-index: 6;
        }

        @keyframes morphWindmills {
            0%, 100% { 
                clip-path: polygon(20% 20%, 80% 0%, 90% 60%, 10% 80%);
                transform: rotate(0deg) scale(1);
            }
            25% { 
                clip-path: polygon(30% 10%, 90% 15%, 85% 70%, 5% 75%);
                transform: rotate(1deg) scale(1.05);
            }
            50% { 
                clip-path: polygon(15% 30%, 85% 5%, 95% 65%, 20% 85%);
                transform: rotate(-1deg) scale(1.1);
            }
            75% { 
                clip-path: polygon(25% 15%, 75% 20%, 80% 75%, 15% 70%);
                transform: rotate(0.5deg) scale(1.08);
            }
        }

        /* Crete coastline */
        .crete-coastline {
            background-image: url('https://images.unsplash.com/photo-1580837119756-563d608dd119?w=1920&h=1080&fit=crop');
            clip-path: ellipse(60% 40% at 30% 70%);
            animation: morphCrete 14s ease-in-out infinite;
            z-index: 2;
        }

        @keyframes morphCrete {
            0%, 100% { 
                clip-path: ellipse(60% 40% at 30% 70%);
                transform: translateY(0) scale(1);
            }
            33% { 
                clip-path: polygon(0% 40%, 70% 60%, 60% 100%, 20% 100%);
                transform: translateY(-20px) scale(1.08);
            }
            66% { 
                clip-path: ellipse(50% 55% at 50% 80%);
                transform: translateY(15px) scale(1.12);
            }
        }

        /* Vouliagmeni Lake */
        .vouliagmeni-lake {
            background-image: url('https://images.unsplash.com/photo-1539650116574-75c0c6d73fb6?w=1920&h=1080&fit=crop');
            clip-path: circle(25% at 80% 30%);
            animation: morphLake 16s ease-in-out infinite;
            z-index: 7;
        }

        @keyframes morphLake {
            0%, 100% { 
                clip-path: circle(25% at 80% 30%);
                transform: scale(1);
            }
            20% { 
                clip-path: ellipse(35% 20% at 75% 40%);
                transform: scale(1.15);
            }
            40% { 
                clip-path: polygon(60% 10%, 95% 25%, 90% 55%, 55% 40%);
                transform: scale(1.05);
            }
            60% { 
                clip-path: circle(30% at 85% 35%);
                transform: scale(1.2);
            }
            80% { 
                clip-path: ellipse(28% 25% at 78% 28%);
                transform: scale(1.1);
            }
        }

        /* Floating geometric overlays */
        .geometric-overlay {
            position: absolute;
            background: linear-gradient(135deg, 
                rgba(30, 58, 138, 0.6), 
                rgba(59, 130, 246, 0.4), 
                rgba(96, 165, 250, 0.3));
            border-radius: 50% 20% 40% 30%;
            animation: floatGeometric 25s ease-in-out infinite;
        }

        .geo-1 {
            width: 200px;
            height: 300px;
            top: 10%;
            left: 70%;
            animation-delay: -5s;
            clip-path: polygon(0% 20%, 60% 0%, 100% 80%, 40% 100%);
        }

        .geo-2 {
            width: 150px;
            height: 250px;
            top: 60%;
            left: 10%;
            animation-delay: -12s;
            clip-path: ellipse(40% 60% at 50% 40%);
        }

        .geo-3 {
            width: 180px;
            height: 180px;
            top: 30%;
            left: 20%;
            animation-delay: -18s;
            clip-path: circle(40% at 60% 40%);
        }

        @keyframes floatGeometric {
            0%, 100% { 
                transform: translateY(0) rotate(0deg) scale(1);
                opacity: 0.7;
            }
            25% { 
                transform: translateY(-30px) rotate(90deg) scale(1.1);
                opacity: 0.9;
            }
            50% { 
                transform: translateY(-60px) rotate(180deg) scale(0.9);
                opacity: 0.6;
            }
            75% { 
                transform: translateY(-30px) rotate(270deg) scale(1.05);
                opacity: 0.8;
            }
        }

        /* Particle system for atmosphere */
        .particles {
            position: absolute;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 8;
        }

        .particle {
            position: absolute;
            background: radial-gradient(circle, rgba(96, 165, 250, 0.8) 0%, transparent 70%);
            border-radius: 50%;
            animation: particleFloat 30s linear infinite;
        }

        .particle:nth-child(odd) {
            background: radial-gradient(circle, rgba(59, 130, 246, 0.6) 0%, transparent 70%);
        }

        .particle:nth-child(3n) {
            background: radial-gradient(circle, rgba(30, 58, 138, 0.7) 0%, transparent 70%);
        }

        @keyframes particleFloat {
            0% { 
                transform: translateY(100vh) translateX(0) scale(0);
                opacity: 0;
            }
            10% {
                opacity: 1;
                transform: translateY(90vh) translateX(10px) scale(1);
            }
            90% {
                opacity: 1;
                transform: translateY(-10vh) translateX(-10px) scale(1);
            }
            100% { 
                transform: translateY(-20vh) translateX(0) scale(0);
                opacity: 0;
            }
        }

        /* Title overlay */
        .title-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
            text-align: center;
            color: white;
            text-shadow: 2px 2px 8px rgba(0, 0, 0, 0.7);
        }

        .main-title {
            font-size: clamp(2rem, 6vw, 4rem);
            font-weight: bold;
            margin-bottom: 1rem;
            background: linear-gradient(135deg, #60a5fa, #3b82f6, #1e3a8a);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            filter: drop-shadow(2px 2px 4px rgba(0, 0, 0, 0.8));
        }

        .subtitle {
            font-size: clamp(1rem, 3vw, 1.5rem);
            opacity: 0.9;
            font-style: italic;
        }

        /* Responsive design */
        @media (max-width: 768px) {
            .geometric-overlay {
                width: 80% !important;
                height: 120px !important;
            }
            
            .particle {
                width: 3px !important;
                height: 3px !important;
            }
        }

        /* Advanced CSS filters for photorealism */
        .photo-layer {
            filter: contrast(1.1) saturation(1.2) brightness(0.95) hue-rotate(10deg);
        }

        .santorini-cliffs {
            filter: contrast(1.15) saturate(1.1) brightness(0.9);
        }

        .athens-acropolis {
            filter: contrast(1.2) sepia(0.1) brightness(0.95);
        }

        .aegean-waters {
            filter: contrast(1.1) saturate(1.3) brightness(1.05) hue-rotate(-5deg);
        }

        .mykonos-windmills {
            filter: contrast(1.08) brightness(1.02) saturate(1.15);
        }

        .crete-coastline {
            filter: contrast(1.12) brightness(0.98) saturate(1.08);
        }

        .vouliagmeni-lake {
            filter: contrast(1.18) saturate(1.25) brightness(0.92);
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Photorealistic layers with morphing clip-paths -->
        <div class="photo-layer crete-coastline"></div>
        <div class="photo-layer aegean-waters"></div>
        <div class="photo-layer athens-acropolis"></div>
        <div class="photo-layer santorini-cliffs"></div>
        <div class="photo-layer mykonos-windmills"></div>
        <div class="photo-layer vouliagmeni-lake"></div>

        <!-- Geometric overlays -->
        <div class="geometric-overlay geo-1"></div>
        <div class="geometric-overlay geo-2"></div>
        <div class="geometric-overlay geo-3"></div>

        <!-- Particle system -->
        <div class="particles" id="particles"></div>

        <!-- Title -->
        <div class="title-overlay">
            <h1 class="main-title">ΑΙΓΑΙΟ ΟΝΕΙΡΟ</h1>
            <p class="subtitle">Aegean Dreams - Morphing Landscapes</p>
        </div>
    </div>

    <script>
        // Create dynamic particle system
        function createParticles() {
            const particlesContainer = document.getElementById('particles');
            const particleCount = window.innerWidth < 768 ? 30 : 60;
            
            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                
                // Random size and position
                const size = Math.random() * 8 + 2;
                particle.style.width = size + 'px';
                particle.style.height = size + 'px';
                particle.style.left = Math.random() * 100 + '%';
                
                // Random animation delay and duration
                particle.style.animationDelay = Math.random() * 30 + 's';
                particle.style.animationDuration = (Math.random() * 20 + 20) + 's';
                
                particlesContainer.appendChild(particle);
            }
        }

        // Advanced morphing shapes controller
        function enhanceMorphing() {
            const layers = document.querySelectorAll('.photo-layer');
            
            layers.forEach((layer, index) => {
                // Add random transform variations
                setInterval(() => {
                    const randomScale = 1 + (Math.random() - 0.5) * 0.02;
                    const randomRotate = (Math.random() - 0.5) * 0.5;
                    const randomTranslate = (Math.random() - 0.5) * 5;
                    
                    layer.style.transform = `
                        scale(${randomScale}) 
                        rotate(${randomRotate}deg) 
                        translateX(${randomTranslate}px)
                    `;
                }, 3000 + Math.random() * 5000);
            });
        }

        // Dynamic color temperature adjustment
        function adjustColorTemperature() {
            const body = document.body;
            const hour = new Date().getHours();
            
            if (hour < 6 || hour > 20) {
                // Night mode - cooler blues
                body.style.filter = 'hue-rotate(15deg) saturate(1.1)';
            } else if (hour >= 6 && hour < 10) {
                // Morning - warmer tones
                body.style.filter = 'hue-rotate(-10deg) saturate(1.05)';
            } else if (hour >= 17 && hour <= 20) {
                // Golden hour
                body.style.filter = 'hue-rotate(-20deg) saturate(1.2) brightness(1.05)';
            } else {
                // Daytime - neutral
                body.style.filter = 'none';
            }
        }

        // Intersection Observer for performance optimization
        function optimizeAnimations() {
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.style.animationPlayState = 'running';
                    } else {
                        entry.target.style.animationPlayState = 'paused';
                    }
                });
            });

            document.querySelectorAll('.photo-layer, .geometric-overlay').forEach(el => {
                observer.observe(el);
            });
        }

        // Initialize everything
        document.addEventListener('DOMContentLoaded', () => {
            createParticles();
            enhanceMorphing();
            adjustColorTemperature();
            optimizeAnimations();
            
            // Adjust color temperature every hour
            setInterval(adjustColorTemperature, 3600000);
        });

        // Responsive particle regeneration
        window.addEventListener('resize', () => {
            document.getElementById('particles').innerHTML = '';
            createParticles();
        });

        // Performance monitoring
        let fps = 0;
        let lastTime = performance.now();
        
        function monitorPerformance() {
            const currentTime = performance.now();
            fps = 1000 / (currentTime - lastTime);
            lastTime = currentTime;
            
            // Reduce particle count if FPS drops below 30
            if (fps < 30) {
                const particles = document.querySelectorAll('.particle');
                for (let i = particles.length - 1; i >= 0; i -= 2) {
                    particles[i].remove();
                }
            }
            
            requestAnimationFrame(monitorPerformance);
        }
        
        requestAnimationFrame(monitorPerformance);
    </script>
</body>
</html>
