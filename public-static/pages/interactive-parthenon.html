<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Parthenon - Particle Physics</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            cursor: none;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            overflow: hidden;
            position: relative;
            background: #000;
        }

        /* Custom cursor */
        .cursor {
            position: fixed;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(96, 165, 250, 0.8);
            border-radius: 50%;
            pointer-events: none;
            z-index: 10000;
            transition: transform 0.1s ease;
            mix-blend-mode: screen;
        }

        .cursor-trail {
            position: fixed;
            width: 40px;
            height: 40px;
            background: radial-gradient(circle, rgba(96, 165, 250, 0.2) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            z-index: 9999;
            transition: transform 0.3s ease;
        }

        /* Main scene */
        .scene {
            position: fixed;
            width: 100%;
            height: 100vh;
            background-image: url('https://images.unsplash.com/photo-1603199507645-7b55ed100362?w=1920&h=1080&fit=crop');
            background-size: cover;
            background-position: center;
        }

        /* Dynamic overlay */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                180deg,
                rgba(30, 58, 138, 0.3) 0%,
                transparent 40%,
                rgba(59, 130, 246, 0.2) 100%
            );
            animation: breathe 8s ease-in-out infinite;
        }

        @keyframes breathe {
            0%, 100% { opacity: 0.8; }
            50% { opacity: 0.4; }
        }

        /* Particle canvas */
        #particleCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        /* Interactive panels */
        .info-panel {
            position: absolute;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 24px;
            color: white;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .info-panel:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-5px);
            box-shadow: 0 10px 40px rgba(96, 165, 250, 0.3);
        }

        .panel-locations {
            top: 60px;
            left: 60px;
            width: 300px;
        }

        .panel-particles {
            top: 60px;
            right: 60px;
            width: 280px;
        }

        .panel-title {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 16px;
            background: linear-gradient(135deg, #60a5fa 0%, #ffffff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .location-btn, .effect-btn {
            display: block;
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            background: rgba(59, 130, 246, 0.1);
            border: 1px solid rgba(96, 165, 250, 0.3);
            border-radius: 10px;
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.95rem;
        }

        .location-btn:hover, .effect-btn:hover {
            background: rgba(59, 130, 246, 0.3);
            transform: translateX(5px);
            box-shadow: 0 0 20px rgba(96, 165, 250, 0.4);
        }

        .location-btn.active, .effect-btn.active {
            background: rgba(96, 165, 250, 0.3);
            border-color: #60a5fa;
        }

        /* Title section */
        .title-section {
            position: absolute;
            bottom: 60px;
            left: 60px;
            max-width: 600px;
            z-index: 100;
        }

        .main-title {
            font-size: 4rem;
            font-weight: 800;
            color: white;
            margin-bottom: 16px;
            text-shadow: 0 4px 20px rgba(0, 0, 0, 0.8);
            animation: slideInUp 1s ease-out;
        }

        @keyframes slideInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .subtitle {
            font-size: 1.2rem;
            color: rgba(255, 255, 255, 0.9);
            line-height: 1.6;
            animation: slideInUp 1s ease-out 0.2s both;
        }

        /* Control badges */
        .badges {
            position: absolute;
            bottom: 60px;
            right: 60px;
            display: flex;
            gap: 12px;
        }

        .badge {
            padding: 8px 16px;
            background: rgba(59, 130, 246, 0.2);
            border: 1px solid rgba(96, 165, 250, 0.4);
            border-radius: 20px;
            color: white;
            font-size: 0.85rem;
            font-weight: 500;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }

        .badge:hover {
            background: rgba(96, 165, 250, 0.3);
            transform: scale(1.05);
        }

        /* Loading screen */
        .loading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 20000;
            transition: opacity 0.5s ease;
        }

        .loading.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .loader {
            width: 60px;
            height: 60px;
            border: 3px solid rgba(255, 255, 255, 0.2);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Time controls */
        .time-control {
            position: absolute;
            top: 200px;
            left: 60px;
            width: 300px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 24px;
            color: white;
        }

        .time-slider {
            width: 100%;
            margin: 16px 0;
            -webkit-appearance: none;
            appearance: none;
            height: 4px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 2px;
            outline: none;
        }

        .time-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 16px;
            height: 16px;
            background: #60a5fa;
            border-radius: 50%;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <!-- Loading screen -->
    <div class="loading" id="loading">
        <div class="loader"></div>
    </div>

    <!-- Custom cursor -->
    <div class="cursor"></div>
    <div class="cursor-trail"></div>

    <!-- Main scene -->
    <div class="scene">
        <div class="overlay"></div>
        <canvas id="particleCanvas"></canvas>
    </div>

    <!-- Interactive panels -->
    <div class="info-panel panel-locations">
        <div class="panel-title">Greek Landscapes</div>
        <button class="location-btn active" data-scene="parthenon">Parthenon</button>
        <button class="location-btn" data-scene="mediterranean">Mediterranean Sea</button>
        <button class="location-btn" data-scene="olive">Olive Grove</button>
        <button class="location-btn" data-scene="santorini">Santorini</button>
    </div>

    <div class="info-panel panel-particles">
        <div class="panel-title">Particle Effects</div>
        <button class="effect-btn active" data-effect="dust">Dust Particles</button>
        <button class="effect-btn" data-effect="pollen">Pollen</button>
        <button class="effect-btn" data-effect="sea">Sea Spray</button>
        <button class="effect-btn" data-effect="light">Light Rays</button>
        <button class="effect-btn" data-effect="atmosphere">Atmosphere</button>
    </div>

    <div class="time-control">
        <div class="panel-title">Time of Day</div>
        <input type="range" class="time-slider" min="0" max="24" value="12" step="0.5">
        <div style="display: flex; justify-content: space-between; font-size: 0.85rem; opacity: 0.7;">
            <span>Dawn</span>
            <span id="timeDisplay">12:00</span>
            <span>Dusk</span>
        </div>
    </div>

    <!-- Title section -->
    <div class="title-section">
        <h1 class="main-title">The Eternal Parthenon</h1>
        <p class="subtitle">Where marble meets eternity beneath Athenian skies. Interactive particle physics brings ancient Greece to life.</p>
    </div>

    <!-- Control badges -->
    <div class="badges">
        <div class="badge">🖼️ Real Photos</div>
        <div class="badge">✨ SVG MASKS</div>
        <div class="badge">🎬 ANIMATIONS</div>
        <div class="badge">🎨 CANVAS</div>
        <div class="badge">⚡ PHYSICS</div>
    </div>

    <script>
        // Custom cursor
        const cursor = document.querySelector('.cursor');
        const cursorTrail = document.querySelector('.cursor-trail');
        
        document.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX - 10 + 'px';
            cursor.style.top = e.clientY - 10 + 'px';
            
            setTimeout(() => {
                cursorTrail.style.left = e.clientX - 20 + 'px';
                cursorTrail.style.top = e.clientY - 20 + 'px';
            }, 50);
        });

        // Particle system
        const canvas = document.getElementById('particleCanvas');
        const ctx = canvas.getContext('2d');
        
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        class Particle {
            constructor(effect) {
                this.effect = effect;
                this.reset();
            }

            reset() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.speedX = (Math.random() - 0.5) * 2;
                this.speedY = Math.random() * 0.5 + 0.5;
                this.size = Math.random() * 3 + 1;
                this.opacity = Math.random() * 0.5 + 0.3;
                this.life = 1;
                
                // Different behaviors based on effect type
                switch(this.effect) {
                    case 'dust':
                        this.color = 'rgba(214, 181, 136, ';
                        this.speedY = Math.random() * 0.3 + 0.1;
                        break;
                    case 'pollen':
                        this.color = 'rgba(255, 223, 107, ';
                        this.speedX = Math.sin(Date.now() * 0.001) * 2;
                        break;
                    case 'sea':
                        this.color = 'rgba(173, 216, 230, ';
                        this.speedY = -Math.random() * 2 - 1;
                        break;
                    case 'light':
                        this.color = 'rgba(255, 255, 255, ';
                        this.size = Math.random() * 1 + 0.5;
                        this.speedY = Math.random() * 0.2 + 0.1;
                        break;
                    case 'atmosphere':
                        this.color = 'rgba(96, 165, 250, ';
                        this.speedX = Math.sin(Date.now() * 0.0005) * 3;
                        break;
                    default:
                        this.color = 'rgba(255, 255, 255, ';
                }
            }

            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                this.life -= 0.01;
                
                // Sine wave movement for some particles
                if (this.effect === 'pollen' || this.effect === 'atmosphere') {
                    this.x += Math.sin(this.y * 0.01) * 0.5;
                }
                
                // Reset when out of bounds or life ends
                if (this.x > canvas.width || this.x < 0 || 
                    this.y > canvas.height || this.y < -10 || 
                    this.life <= 0) {
                    this.reset();
                    this.y = this.effect === 'sea' ? canvas.height : -10;
                }
            }

            draw() {
                ctx.save();
                ctx.globalAlpha = this.opacity * this.life;
                ctx.fillStyle = this.color + ctx.globalAlpha + ')';
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                
                // Glow effect for light particles
                if (this.effect === 'light') {
                    ctx.shadowBlur = 10;
                    ctx.shadowColor = this.color + '0.5)';
                    ctx.fill();
                }
                ctx.restore();
            }
        }

        let particles = [];
        let currentEffect = 'dust';
        let particleCount = 150;

        function initParticles() {
            particles = [];
            for (let i = 0; i < particleCount; i++) {
                particles.push(new Particle(currentEffect));
            }
        }

        function animateParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            particles.forEach(particle => {
                particle.update();
                particle.draw();
            });
            
            requestAnimationFrame(animateParticles);
        }

        initParticles();
        animateParticles();

        // Scene switching
        const sceneButtons = document.querySelectorAll('.location-btn');
        const scene = document.querySelector('.scene');
        const title = document.querySelector('.main-title');
        const subtitle = document.querySelector('.subtitle');

        const scenes = {
            parthenon: {
                image: 'https://images.unsplash.com/photo-1603199507645-7b55ed100362?w=1920&h=1080&fit=crop',
                title: 'The Eternal Parthenon',
                subtitle: 'Where marble meets eternity beneath Athenian skies. Interactive particle physics brings ancient Greece to life.'
            },
            mediterranean: {
                image: 'https://images.unsplash.com/photo-1533105079780-92b9be482077?w=1920&h=1080&fit=crop',
                title: 'Mediterranean Waves',
                subtitle: 'Crystal waters dance with interactive wave physics, creating endless rhythms of the Aegean.'
            },
            olive: {
                image: 'https://images.unsplash.com/photo-1565011523534-747a8601f10a?w=1920&h=1080&fit=crop',
                title: 'Ancient Olive Groves',
                subtitle: 'Wind simulation brings thousand-year-old trees to life with real-time physics.'
            },
            santorini: {
                image: 'https://images.unsplash.com/photo-1570077188670-e3a8d69ac5ff?w=1920&h=1080&fit=crop',
                title: 'Santorini Sunsets',
                subtitle: 'Dynamic time-of-day system paints the caldera with ever-changing light.'
            }
        };

        sceneButtons.forEach(btn => {
            btn.addEventListener('click', () => {
                const sceneName = btn.dataset.scene;
                const sceneData = scenes[sceneName];
                
                // Update active state
                sceneButtons.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                
                // Fade transition
                scene.style.opacity = '0';
                setTimeout(() => {
                    scene.style.backgroundImage = `url('${sceneData.image}')`;
                    title.textContent = sceneData.title;
                    subtitle.textContent = sceneData.subtitle;
                    scene.style.opacity = '1';
                }, 300);
                
                scene.style.transition = 'opacity 0.3s ease';
            });
        });

        // Effect switching
        const effectButtons = document.querySelectorAll('.effect-btn');
        
        effectButtons.forEach(btn => {
            btn.addEventListener('click', () => {
                const effect = btn.dataset.effect;
                currentEffect = effect;
                
                // Update active state
                effectButtons.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                
                // Reinitialize particles with new effect
                initParticles();
            });
        });

        // Time of day control
        const timeSlider = document.querySelector('.time-slider');
        const timeDisplay = document.getElementById('timeDisplay');
        const overlay = document.querySelector('.overlay');

        timeSlider.addEventListener('input', (e) => {
            const hours = parseFloat(e.target.value);
            const minutes = (hours % 1) * 60;
            timeDisplay.textContent = `${Math.floor(hours)}:${minutes === 0 ? '00' : '30'}`;
            
            // Calculate overlay opacity based on time
            let overlayColor;
            if (hours < 6) {
                // Night to dawn
                overlayColor = `linear-gradient(180deg, 
                    rgba(10, 10, 40, ${0.8 - (hours / 6) * 0.3}) 0%, 
                    transparent 40%, 
                    rgba(30, 30, 80, ${0.6 - (hours / 6) * 0.2}) 100%)`;
            } else if (hours < 12) {
                // Dawn to noon
                overlayColor = `linear-gradient(180deg, 
                    rgba(255, 150, 50, ${0.3 - ((hours - 6) / 6) * 0.3}) 0%, 
                    transparent 40%, 
                    rgba(255, 200, 100, ${0.2 - ((hours - 6) / 6) * 0.2}) 100%)`;
            } else if (hours < 18) {
                // Noon to dusk
                overlayColor = `linear-gradient(180deg, 
                    rgba(30, 58, 138, ${0.1 + ((hours - 12) / 6) * 0.2}) 0%, 
                    transparent 40%, 
                    rgba(59, 130, 246, ${0.1 + ((hours - 12) / 6) * 0.2}) 100%)`;
            } else {
                // Dusk to night
                overlayColor = `linear-gradient(180deg, 
                    rgba(255, 100, 50, ${0.4 - ((hours - 18) / 6) * 0.3}) 0%, 
                    transparent 40%, 
                    rgba(150, 50, 150, ${0.5 - ((hours - 18) / 6) * 0.3}) 100%)`;
            }
            
            overlay.style.background = overlayColor;
        });

        // Remove loading screen
        window.addEventListener('load', () => {
            setTimeout(() => {
                document.getElementById('loading').classList.add('hidden');
            }, 1000);
        });

        // Interactive hover effects on panels
        const panels = document.querySelectorAll('.info-panel');
        panels.forEach(panel => {
            panel.addEventListener('mouseenter', () => {
                cursor.style.transform = 'scale(1.5)';
                cursor.style.borderColor = '#60a5fa';
            });
            
            panel.addEventListener('mouseleave', () => {
                cursor.style.transform = 'scale(1)';
                cursor.style.borderColor = 'rgba(96, 165, 250, 0.8)';
            });
        });
    </script>
</body>
</html>
