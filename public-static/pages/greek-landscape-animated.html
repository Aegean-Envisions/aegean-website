<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animated Greek Landscape - Athens/Vouliagmeni</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(to bottom, #87CEEB 0%, #E0F6FF 50%, #98D8E8 100%);
            font-family: 'Arial', sans-serif;
            overflow-x: hidden;
        }

        .landscape-container {
            width: 100vw;
            height: 100vh;
            position: relative;
            overflow: hidden;
        }

        .landscape-svg {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
        }

        /* Fade-in animation for the entire landscape */
        .landscape-container {
            animation: fadeIn 2s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* Additional styling for responsiveness */
        @media (max-width: 768px) {
            .landscape-svg {
                min-width: 768px;
            }
        }
    </style>
</head>
<body>
    <div class="landscape-container">
        <svg class="landscape-svg" viewBox="0 0 1200 800" preserveAspectRatio="xMidYMid slice">
            <!-- Definitions for gradients, patterns, and animations -->
            <defs>
                <!-- Sky gradient -->
                <linearGradient id="skyGradient" x1="0%" y1="0%" x2="0%" y2="100%">
                    <stop offset="0%" style="stop-color:#87CEEB"/>
                    <stop offset="50%" style="stop-color:#E0F6FF"/>
                    <stop offset="100%" style="stop-color:#98D8E8"/>
                </linearGradient>

                <!-- Sea gradient -->
                <linearGradient id="seaGradient" x1="0%" y1="0%" x2="0%" y2="100%">
                    <stop offset="0%" style="stop-color:#4682B4"/>
                    <stop offset="50%" style="stop-color:#1E90FF"/>
                    <stop offset="100%" style="stop-color:#006994"/>
                </linearGradient>

                <!-- Sun gradient -->
                <radialGradient id="sunGradient" cx="50%" cy="50%" r="50%">
                    <stop offset="0%" style="stop-color:#FFD700"/>
                    <stop offset="70%" style="stop-color:#FFA500"/>
                    <stop offset="100%" style="stop-color:#FF8C00"/>
                </radialGradient>

                <!-- Cloud pattern -->
                <filter id="cloudShadow">
                    <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="rgba(0,0,0,0.1)"/>
                </filter>

                <!-- Olive leaf pattern -->
                <pattern id="oliveLeafPattern" patternUnits="userSpaceOnUse" width="20" height="10">
                    <ellipse cx="10" cy="5" rx="8" ry="3" fill="#8FBC8F"/>
                </pattern>
            </defs>

            <!-- Sky background -->
            <rect width="1200" height="800" fill="url(#skyGradient)"/>

            <!-- Animated Sun -->
            <g id="sun">
                <circle cx="200" cy="120" r="60" fill="url(#sunGradient)">
                    <animate attributeName="r" values="60;65;60" dur="4s" repeatCount="indefinite"/>
                    <animate attributeName="opacity" values="0.8;1;0.8" dur="3s" repeatCount="indefinite"/>
                </circle>
                <!-- Sun rays -->
                <g stroke="#FFD700" stroke-width="3" stroke-linecap="round">
                    <animateTransform attributeName="transform" type="rotate" values="0 200 120;360 200 120" dur="20s" repeatCount="indefinite"/>
                    <line x1="200" y1="40" x2="200" y2="20"/>
                    <line x1="200" y1="200" x2="200" y2="220"/>
                    <line x1="120" y1="120" x2="100" y2="120"/>
                    <line x1="280" y1="120" x2="300" y2="120"/>
                    <line x1="151" y1="69" x2="137" y2="55"/>
                    <line x1="249" y1="171" x2="263" y2="185"/>
                    <line x1="151" y1="171" x2="137" y2="185"/>
                    <line x1="249" y1="69" x2="263" y2="55"/>
                </g>
            </g>

            <!-- Animated Clouds -->
            <g id="clouds">
                <!-- Cloud 1 -->
                <g>
                    <animateTransform attributeName="transform" type="translate" values="0,0;100,0;0,0" dur="25s" repeatCount="indefinite"/>
                    <ellipse cx="300" cy="80" rx="40" ry="25" fill="white" filter="url(#cloudShadow)" opacity="0.8"/>
                    <ellipse cx="340" cy="75" rx="35" ry="20" fill="white" filter="url(#cloudShadow)" opacity="0.8"/>
                    <ellipse cx="320" cy="60" rx="30" ry="18" fill="white" filter="url(#cloudShadow)" opacity="0.8"/>
                </g>
                
                <!-- Cloud 2 -->
                <g>
                    <animateTransform attributeName="transform" type="translate" values="0,0;-80,0;0,0" dur="30s" repeatCount="indefinite"/>
                    <ellipse cx="600" cy="100" rx="35" ry="20" fill="white" filter="url(#cloudShadow)" opacity="0.7"/>
                    <ellipse cx="630" cy="95" rx="40" ry="25" fill="white" filter="url(#cloudShadow)" opacity="0.7"/>
                    <ellipse cx="610" cy="80" rx="25" ry="15" fill="white" filter="url(#cloudShadow)" opacity="0.7"/>
                </g>

                <!-- Cloud 3 -->
                <g>
                    <animateTransform attributeName="transform" type="translate" values="0,0;120,0;0,0" dur="35s" repeatCount="indefinite"/>
                    <ellipse cx="900" cy="70" rx="45" ry="28" fill="white" filter="url(#cloudShadow)" opacity="0.6"/>
                    <ellipse cx="940" cy="65" rx="38" ry="23" fill="white" filter="url(#cloudShadow)" opacity="0.6"/>
                    <ellipse cx="920" cy="50" rx="32" ry="20" fill="white" filter="url(#cloudShadow)" opacity="0.6"/>
                </g>
            </g>

            <!-- Mountains/Hills in background -->
            <path d="M 0,300 Q 200,250 400,280 Q 600,220 800,260 Q 1000,200 1200,240 L 1200,400 L 0,400 Z" 
                  fill="#8B7D6B" opacity="0.6">
                <animate attributeName="opacity" values="0.6;0.8;0.6" dur="8s" repeatCount="indefinite"/>
            </path>

            <!-- Sea with animated waves -->
            <g id="sea">
                <rect x="0" y="400" width="1200" height="400" fill="url(#seaGradient)"/>
                
                <!-- Wave animations using paths -->
                <path id="wave1" d="M 0,420 Q 100,410 200,420 Q 300,430 400,420 Q 500,410 600,420 Q 700,430 800,420 Q 900,410 1000,420 Q 1100,430 1200,420 L 1200,450 L 0,450 Z" 
                      fill="#4169E1" opacity="0.7">
                    <animate attributeName="d" values="M 0,420 Q 100,410 200,420 Q 300,430 400,420 Q 500,410 600,420 Q 700,430 800,420 Q 900,410 1000,420 Q 1100,430 1200,420 L 1200,450 L 0,450 Z;
                                                      M 0,425 Q 100,415 200,425 Q 300,435 400,425 Q 500,415 600,425 Q 700,435 800,425 Q 900,415 1000,425 Q 1100,435 1200,425 L 1200,450 L 0,450 Z;
                                                      M 0,420 Q 100,410 200,420 Q 300,430 400,420 Q 500,410 600,420 Q 700,430 800,420 Q 900,410 1000,420 Q 1100,430 1200,420 L 1200,450 L 0,450 Z" 
                             dur="3s" repeatCount="indefinite"/>
                </path>

                <path id="wave2" d="M 0,440 Q 150,430 300,440 Q 450,450 600,440 Q 750,430 900,440 Q 1050,450 1200,440 L 1200,470 L 0,470 Z" 
                      fill="#1E90FF" opacity="0.5">
                    <animate attributeName="d" values="M 0,440 Q 150,430 300,440 Q 450,450 600,440 Q 750,430 900,440 Q 1050,450 1200,440 L 1200,470 L 0,470 Z;
                                                      M 0,445 Q 150,435 300,445 Q 450,455 600,445 Q 750,435 900,445 Q 1050,455 1200,445 L 1200,470 L 0,470 Z;
                                                      M 0,440 Q 150,430 300,440 Q 450,450 600,440 Q 750,430 900,440 Q 1050,450 1200,440 L 1200,470 L 0,470 Z" 
                             dur="4s" repeatCount="indefinite"/>
                </path>

                <path id="wave3" d="M 0,460 Q 200,450 400,460 Q 600,470 800,460 Q 1000,450 1200,460 L 1200,490 L 0,490 Z" 
                      fill="#00CED1" opacity="0.3">
                    <animate attributeName="d" values="M 0,460 Q 200,450 400,460 Q 600,470 800,460 Q 1000,450 1200,460 L 1200,490 L 0,490 Z;
                                                      M 0,465 Q 200,455 400,465 Q 600,475 800,465 Q 1000,455 1200,465 L 1200,490 L 0,490 Z;
                                                      M 0,460 Q 200,450 400,460 Q 600,470 800,460 Q 1000,450 1200,460 L 1200,490 L 0,490 Z" 
                             dur="5s" repeatCount="indefinite"/>
                </path>
            </g>

            <!-- Parthenon Monument -->
            <g id="parthenon" transform="translate(500,280)">
                <!-- Base -->
                <rect x="0" y="80" width="180" height="15" fill="#D2B48C">
                    <animate attributeName="opacity" values="0.8;1;0.8" dur="6s" repeatCount="indefinite"/>
                </rect>
                
                <!-- Columns -->
                <g stroke="#D2B48C" stroke-width="8" stroke-linecap="round">
                    <line x1="10" y1="20" x2="10" y2="80">
                        <animate attributeName="stroke-width" values="8;10;8" dur="4s" repeatCount="indefinite"/>
                    </line>
                    <line x1="35" y1="20" x2="35" y2="80">
                        <animate attributeName="stroke-width" values="8;10;8" dur="4.5s" repeatCount="indefinite"/>
                    </line>
                    <line x1="60" y1="20" x2="60" y2="80">
                        <animate attributeName="stroke-width" values="8;10;8" dur="5s" repeatCount="indefinite"/>
                    </line>
                    <line x1="85" y1="20" x2="85" y2="80">
                        <animate attributeName="stroke-width" values="8;10;8" dur="4.2s" repeatCount="indefinite"/>
                    </line>
                    <line x1="110" y1="20" x2="110" y2="80">
                        <animate attributeName="stroke-width" values="8;10;8" dur="4.8s" repeatCount="indefinite"/>
                    </line>
                    <line x1="135" y1="20" x2="135" y2="80">
                        <animate attributeName="stroke-width" values="8;10;8" dur="5.2s" repeatCount="indefinite"/>
                    </line>
                    <line x1="160" y1="20" x2="160" y2="80">
                        <animate attributeName="stroke-width" values="8;10;8" dur="4.6s" repeatCount="indefinite"/>
                    </line>
                </g>
                
                <!-- Roof -->
                <path d="M -10,20 L 90,5 L 190,20 L 180,25 L 90,15 L 0,25 Z" fill="#C0A080">
                    <animateTransform attributeName="transform" type="translate" values="0,0;0,-2;0,0" dur="6s" repeatCount="indefinite"/>
                </path>
            </g>

            <!-- Ancient Greek Temple (smaller) -->
            <g id="temple" transform="translate(800,320)">
                <rect x="0" y="50" width="100" height="8" fill="#D2B48C"/>
                <g stroke="#D2B48C" stroke-width="4" stroke-linecap="round">
                    <line x1="10" y1="15" x2="10" y2="50">
                        <animate attributeName="opacity" values="0.7;1;0.7" dur="3s" repeatCount="indefinite"/>
                    </line>
                    <line x1="30" y1="15" x2="30" y2="50">
                        <animate attributeName="opacity" values="0.7;1;0.7" dur="3.5s" repeatCount="indefinite"/>
                    </line>
                    <line x1="50" y1="15" x2="50" y2="50">
                        <animate attributeName="opacity" values="0.7;1;0.7" dur="4s" repeatCount="indefinite"/>
                    </line>
                    <line x1="70" y1="15" x2="70" y2="50">
                        <animate attributeName="opacity" values="0.7;1;0.7" dur="3.2s" repeatCount="indefinite"/>
                    </line>
                    <line x1="90" y1="15" x2="90" y2="50">
                        <animate attributeName="opacity" values="0.7;1;0.7" dur="3.8s" repeatCount="indefinite"/>
                    </line>
                </g>
                <path d="M -5,15 L 50,5 L 105,15 L 100,20 L 50,12 L 0,20 Z" fill="#C0A080"/>
            </g>

            <!-- Olive Trees with swaying branches -->
            <g id="oliveGrove">
                <!-- Olive Tree 1 -->
                <g transform="translate(100,350)">
                    <rect x="15" y="40" width="10" height="30" fill="#8B4513"/>
                    <g id="oliveLeaves1">
                        <animateTransform attributeName="transform" type="rotate" values="0 20 30;5 20 30;-5 20 30;0 20 30" dur="4s" repeatCount="indefinite"/>
                        <circle cx="20" cy="30" r="25" fill="#6B8E23" opacity="0.8"/>
                        <circle cx="15" cy="25" r="20" fill="#8FBC8F" opacity="0.7"/>
                        <circle cx="25" cy="35" r="18" fill="#9ACD32" opacity="0.6"/>
                    </g>
                </g>

                <!-- Olive Tree 2 -->
                <g transform="translate(150,340)">
                    <rect x="18" y="50" width="12" height="35" fill="#8B4513"/>
                    <g id="oliveLeaves2">
                        <animateTransform attributeName="transform" type="rotate" values="0 25 35;-3 25 35;3 25 35;0 25 35" dur="5s" repeatCount="indefinite"/>
                        <circle cx="25" cy="35" r="28" fill="#6B8E23" opacity="0.8"/>
                        <circle cx="30" cy="30" r="22" fill="#8FBC8F" opacity="0.7"/>
                        <circle cx="20" cy="40" r="20" fill="#9ACD32" opacity="0.6"/>
                    </g>
                </g>

                <!-- Olive Tree 3 -->
                <g transform="translate(80,360)">
                    <rect x="12" y="35" width="8" height="25" fill="#8B4513"/>
                    <g id="oliveLeaves3">
                        <animateTransform attributeName="transform" type="rotate" values="0 16 25;4 16 25;-4 16 25;0 16 25" dur="3.5s" repeatCount="indefinite"/>
                        <circle cx="16" cy="25" r="20" fill="#6B8E23" opacity="0.8"/>
                        <circle cx="12" cy="20" r="16" fill="#8FBC8F" opacity="0.7"/>
                        <circle cx="20" cy="30" r="15" fill="#9ACD32" opacity="0.6"/>
                    </g>
                </g>

                <!-- More olive trees in background -->
                <g transform="translate(200,355)" opacity="0.6">
                    <rect x="10" y="30" width="6" height="20" fill="#8B4513"/>
                    <g>
                        <animateTransform attributeName="transform" type="rotate" values="0 13 20;2 13 20;-2 13 20;0 13 20" dur="4.5s" repeatCount="indefinite"/>
                        <circle cx="13" cy="20" r="15" fill="#6B8E23" opacity="0.8"/>
                        <circle cx="10" cy="18" r="12" fill="#8FBC8F" opacity="0.7"/>
                    </g>
                </g>

                <g transform="translate(250,350)" opacity="0.5">
                    <rect x="8" y="28" width="5" height="18" fill="#8B4513"/>
                    <g>
                        <animateTransform attributeName="transform" type="rotate" values="0 10 18;-1 10 18;1 10 18;0 10 18" dur="6s" repeatCount="indefinite"/>
                        <circle cx="10" cy="18" r="12" fill="#6B8E23" opacity="0.8"/>
                        <circle cx="8" cy="16" r="10" fill="#8FBC8F" opacity="0.7"/>
                    </g>
                </g>
            </g>

            <!-- Flying Birds -->
            <g id="birds">
                <!-- Bird 1 -->
                <g>
                    <animateTransform attributeName="transform" type="translate" values="0,150;1200,120;0,150" dur="15s" repeatCount="indefinite"/>
                    <path d="M 0,0 Q -5,-3 -10,0 Q -5,3 0,0" fill="none" stroke="#333" stroke-width="2">
                        <animateTransform attributeName="transform" type="rotate" values="0 0 0;10 0 0;-10 0 0;0 0 0" dur="0.5s" repeatCount="indefinite"/>
                    </path>
                    <path d="M 0,0 Q 5,-3 10,0 Q 5,3 0,0" fill="none" stroke="#333" stroke-width="2">
                        <animateTransform attributeName="transform" type="rotate" values="0 0 0;-10 0 0;10 0 0;0 0 0" dur="0.5s" repeatCount="indefinite"/>
                    </path>
                </g>

                <!-- Bird 2 -->
                <g>
                    <animateTransform attributeName="transform" type="translate" values="200,180;1400,140;200,180" dur="18s" repeatCount="indefinite"/>
                    <path d="M 0,0 Q -4,-2 -8,0 Q -4,2 0,0" fill="none" stroke="#333" stroke-width="1.5">
                        <animateTransform attributeName="transform" type="rotate" values="0 0 0;8 0 0;-8 0 0;0 0 0" dur="0.6s" repeatCount="indefinite"/>
                    </path>
                    <path d="M 0,0 Q 4,-2 8,0 Q 4,2 0,0" fill="none" stroke="#333" stroke-width="1.5">
                        <animateTransform attributeName="transform" type="rotate" values="0 0 0;-8 0 0;8 0 0;0 0 0" dur="0.6s" repeatCount="indefinite"/>
                    </path>
                </g>

                <!-- Bird 3 -->
                <g>
                    <animateTransform attributeName="transform" type="translate" values="400,120;1600,160;400,120" dur="20s" repeatCount="indefinite"/>
                    <path d="M 0,0 Q -6,-4 -12,0 Q -6,4 0,0" fill="none" stroke="#333" stroke-width="2">
                        <animateTransform attributeName="transform" type="rotate" values="0 0 0;12 0 0;-12 0 0;0 0 0" dur="0.4s" repeatCount="indefinite"/>
                    </path>
                    <path d="M 0,0 Q 6,-4 12,0 Q 6,4 0,0" fill="none" stroke="#333" stroke-width="2">
                        <animateTransform attributeName="transform" type="rotate" values="0 0 0;-12 0 0;12 0 0;0 0 0" dur="0.4s" repeatCount="indefinite"/>
                    </path>
                </g>
            </g>

            <!-- Animated Greek Boats -->
            <g id="boats">
                <!-- Boat 1 -->
                <g transform="translate(300,480)">
                    <animateTransform attributeName="transform" type="translate" values="300,480;400,485;300,480" dur="12s" repeatCount="indefinite"/>
                    <!-- Hull -->
                    <path d="M 0,10 Q 25,0 50,10 Q 50,20 25,25 Q 0,20 0,10" fill="#8B4513"/>
                    <!-- Sail -->
                    <path d="M 25,10 L 25,-20 Q 35,-25 40,-20 L 40,10" fill="white" stroke="#DDD">
                        <animateTransform attributeName="transform" type="skewX" values="0;5;-5;0" dur="3s" repeatCount="indefinite"/>
                    </path>
                    <!-- Mast -->
                    <line x1="25" y1="10" x2="25" y2="-20" stroke="#8B4513" stroke-width="2"/>
                </g>

                <!-- Boat 2 -->
                <g transform="translate(700,490)">
                    <animateTransform attributeName="transform" type="translate" values="700,490;600,495;700,490" dur="15s" repeatCount="indefinite"/>
                    <!-- Hull -->
                    <path d="M 0,8 Q 20,0 40,8 Q 40,16 20,20 Q 0,16 0,8" fill="#654321"/>
                    <!-- Sail -->
                    <path d="M 20,8 L 20,-15 Q 28,-18 32,-15 L 32,8" fill="white" stroke="#EEE">
                        <animateTransform attributeName="transform" type="skewX" values="0;-3;3;0" dur="4s" repeatCount="indefinite"/>
                    </path>
                    <!-- Mast -->
                    <line x1="20" y1="8" x2="20" y2="-15" stroke="#654321" stroke-width="1.5"/>
                </g>
            </g>

            <!-- Animated Lighthouse -->
            <g id="lighthouse" transform="translate(1000,350)">
                <!-- Base -->
                <rect x="10" y="40" width="30" height="60" fill="#F5F5DC"/>
                <!-- Tower -->
                <rect x="15" y="20" width="20" height="25" fill="#FFFFFF"/>
                <!-- Light -->
                <circle cx="25" cy="15" r="8" fill="#FFFF00">
                    <animate attributeName="opacity" values="0.3;1;0.3" dur="2s" repeatCount="indefinite"/>
                </circle>
                <!-- Light beam -->
                <path d="M 25,15 L 15,5 L 35,5 Z" fill="yellow" opacity="0.3">
                    <animateTransform attributeName="transform" type="rotate" values="0 25 15;360 25 15" dur="4s" repeatCount="indefinite"/>
                    <animate attributeName="opacity" values="0.1;0.5;0.1" dur="2s" repeatCount="indefinite"/>
                </path>
            </g>

            <!-- Seagulls near the shore -->
            <g id="seagulls">
                <!-- Seagull 1 -->
                <g>
                    <animateTransform attributeName="transform" type="translate" values="100,320;300,310;100,320" dur="8s" repeatCount="indefinite"/>
                    <path d="M 0,0 Q -3,-2 -6,0 Q -3,1 0,0" fill="white" stroke="#DDD" stroke-width="1">
                        <animateTransform attributeName="transform" type="rotate" values="0 0 0;15 0 0;-15 0 0;0 0 0" dur="0.3s" repeatCount="indefinite"/>
                    </path>
                    <path d="M 0,0 Q 3,-2 6,0 Q 3,1 0,0" fill="white" stroke="#DDD" stroke-width="1">
                        <animateTransform attributeName="transform" type="rotate" values="0 0 0;-15 0 0;15 0 0;0 0 0" dur="0.3s" repeatCount="indefinite"/>
                    </path>
                </g>

                <!-- Seagull 2 -->
                <g>
                    <animateTransform attributeName="transform" type="translate" values="400,330;600,320;400,330" dur="10s" repeatCount="indefinite"/>
                    <path d="M 0,0 Q -4,-2 -8,0 Q -4,1 0,0" fill="white" stroke="#DDD" stroke-width="1">
                        <animateTransform attributeName="transform" type="rotate" values="0 0 0;12 0 0;-12 0 0;0 0 0" dur="0.4s" repeatCount="indefinite"/>
                    </path>
                    <path d="M 0,0 Q 4,-2 8,0 Q 4,1 0,0" fill="white" stroke="#DDD" stroke-width="1">
                        <animateTransform attributeName="transform" type="rotate" values="0 0 0;-12 0 0;12 0 0;0 0 0" dur="0.4s" repeatCount="indefinite"/>
                    </path>
                </g>
            </g>

            <!-- Greek Flag on a pole -->
            <g id="greekFlag" transform="translate(920,250)">
                <line x1="0" y1="0" x2="0" y2="80" stroke="#8B4513" stroke-width="3"/>
                <rect x="0" y="0" width="40" height="30" fill="white"/>
                <rect x="0" y="0" width="40" height="3" fill="#0066CC"/>
                <rect x="0" y="6" width="40" height="3" fill="#0066CC"/>
                <rect x="0" y="12" width="40" height="3" fill="#0066CC"/>
                <rect x="0" y="18" width="40" height="3" fill="#0066CC"/>
                <rect x="0" y="24" width="40" height="3" fill="#0066CC"/>
                <!-- Cross -->
                <rect x="0" y="0" width="16" height="16" fill="#0066CC"/>
                <rect x="6" y="0" width="4" height="16" fill="white"/>
                <rect x="0" y="6" width="16" height="4" fill="white"/>
                <!-- Flag animation -->
                <animateTransform attributeName="transform" type="translate,skewX" values="920,250,0;920,250,3;920,250,-3;920,250,0" dur="2s" repeatCount="indefinite"/>
            </g>

            <!-- Sparkling stars that appear at dusk -->
            <g id="stars" opacity="0.3">
                <circle cx="150" cy="80" r="1" fill="white">
                    <animate attributeName="opacity" values="0;1;0" dur="3s" repeatCount="indefinite"/>
                </circle>
                <circle cx="250" cy="60" r="1.5" fill="white">
                    <animate attributeName="opacity" values="0;1;0" dur="2.5s" begin="0.5s" repeatCount="indefinite"/>
                </circle>
                <circle cx="350" cy="90" r="1" fill="white">
                    <animate attributeName="opacity" values="0;1;0" dur="4s" begin="1s" repeatCount="indefinite"/>
                </circle>
                <circle cx="450" cy="70" r="1.2" fill="white">
                    <animate attributeName="opacity" values="0;1;0" dur="3.5s" begin="1.5s" repeatCount="indefinite"/>
                </circle>
            </g>

            <!-- Foreground elements -->
            <!-- Beach/Shore -->
            <path d="M 0,400 Q 200,390 400,400 Q 600,410 800,400 Q 1000,390 1200,400 L 1200,420 L 0,420 Z" 
                  fill="#F4A460" opacity="0.8">
                <animate attributeName="d" values="M 0,400 Q 200,390 400,400 Q 600,410 800,400 Q 1000,390 1200,400 L 1200,420 L 0,420 Z;
                                                  M 0,405 Q 200,395 400,405 Q 600,415 800,405 Q 1000,395 1200,405 L 1200,420 L 0,420 Z;
                                                  M 0,400 Q 200,390 400,400 Q 600,410 800,400 Q 1000,390 1200,400 L 1200,420 L 0,420 Z" 
                         dur="6s" repeatCount="indefinite"/>
            </path>

            <!-- Animated Greek text appears and fades -->
            <text x="50" y="750" font-family="serif" font-size="24" fill="#2E4057" opacity="0.7">
                Αιγαίο Θάλασσα (Aegean Sea)
                <animate attributeName="opacity" values="0;0.7;0" dur="10s" repeatCount="indefinite"/>
            </text>
        </svg>
    </div>
</body>
</html>
