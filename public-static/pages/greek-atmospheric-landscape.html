<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atmospheric Greek Landscape - Neumorphic Design</title>
    <style>
        :root {
            --deep-blue: #1e3a8a;
            --medium-blue: #3b82f6;
            --light-blue: #60a5fa;
            --sky-blue: #93c5fd;
            --pale-blue: #dbeafe;
            --sand-dark: #c2b280;
            --sand-light: #e4d5b7;
            --olive-dark: #6b7c32;
            --olive-medium: #8b9742;
            --olive-light: #a8b562;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            height: 100%;
            overflow: hidden;
            font-family: 'Arial', sans-serif;
            background: linear-gradient(180deg, 
                var(--pale-blue) 0%, 
                var(--sky-blue) 20%, 
                var(--light-blue) 40%, 
                var(--medium-blue) 70%, 
                var(--deep-blue) 100%);
        }

        .atmospheric-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background: radial-gradient(circle at 30% 30%, 
                rgba(219, 234, 254, 0.8) 0%, 
                rgba(147, 197, 253, 0.6) 25%,
                rgba(96, 165, 250, 0.4) 50%,
                rgba(59, 130, 246, 0.3) 75%,
                rgba(30, 58, 138, 0.8) 100%);
        }

        /* Atmospheric Layers */
        .atmosphere-layer {
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at center bottom,
                rgba(147, 197, 253, 0.1) 0%,
                rgba(96, 165, 250, 0.08) 30%,
                rgba(59, 130, 246, 0.05) 60%,
                transparent 100%);
            filter: blur(0.5px);
        }

        /* Volumetric Clouds */
        .cloud-layer {
            position: absolute;
            width: 120%;
            height: 60%;
            top: 10%;
            left: -10%;
            background: 
                radial-gradient(ellipse 400px 120px at 20% 40%, rgba(255, 255, 255, 0.9), transparent 70%),
                radial-gradient(ellipse 500px 150px at 60% 25%, rgba(255, 255, 255, 0.85), transparent 70%),
                radial-gradient(ellipse 350px 100px at 85% 35%, rgba(255, 255, 255, 0.8), transparent 70%),
                radial-gradient(ellipse 600px 180px at 40% 50%, rgba(255, 255, 255, 0.7), transparent 70%),
                radial-gradient(ellipse 300px 90px at 75% 60%, rgba(255, 255, 255, 0.75), transparent 70%);
            filter: blur(1.5px);
            animation: cloudDrift 60s infinite linear;
            box-shadow: 
                inset 0 -20px 40px rgba(96, 165, 250, 0.2),
                inset 0 20px 40px rgba(255, 255, 255, 0.3),
                0 10px 30px rgba(30, 58, 138, 0.15);
        }

        .cloud-layer-2 {
            position: absolute;
            width: 150%;
            height: 70%;
            top: 5%;
            left: -25%;
            background: 
                radial-gradient(ellipse 450px 140px at 30% 45%, rgba(255, 255, 255, 0.6), transparent 70%),
                radial-gradient(ellipse 380px 110px at 70% 30%, rgba(255, 255, 255, 0.65), transparent 70%),
                radial-gradient(ellipse 520px 160px at 10% 55%, rgba(255, 255, 255, 0.55), transparent 70%);
            filter: blur(2px);
            animation: cloudDrift 80s infinite linear reverse;
            box-shadow: 
                inset 0 -25px 50px rgba(59, 130, 246, 0.15),
                inset 0 25px 50px rgba(255, 255, 255, 0.25);
        }

        /* Mountain Ranges with Neumorphic Effect */
        .mountain-range {
            position: absolute;
            bottom: 20%;
            left: 0;
            width: 100%;
            height: 40%;
            background: linear-gradient(135deg,
                var(--sand-dark) 0%,
                var(--sand-light) 30%,
                #f5f0e8 50%,
                var(--sand-light) 70%,
                var(--sand-dark) 100%);
            clip-path: polygon(0% 70%, 15% 45%, 25% 55%, 35% 30%, 50% 40%, 65% 25%, 80% 45%, 90% 35%, 100% 50%, 100% 100%, 0% 100%);
            box-shadow: 
                inset -20px -20px 40px rgba(194, 178, 128, 0.4),
                inset 20px 20px 40px rgba(245, 240, 232, 0.6),
                0 20px 60px rgba(30, 58, 138, 0.3);
            filter: blur(0.3px);
        }

        .mountain-range-far {
            position: absolute;
            bottom: 25%;
            left: 0;
            width: 100%;
            height: 35%;
            background: linear-gradient(135deg,
                rgba(96, 165, 250, 0.4) 0%,
                rgba(147, 197, 253, 0.5) 50%,
                rgba(96, 165, 250, 0.4) 100%);
            clip-path: polygon(0% 60%, 20% 40%, 40% 50%, 60% 30%, 80% 45%, 100% 35%, 100% 100%, 0% 100%);
            box-shadow: 
                inset -15px -15px 30px rgba(59, 130, 246, 0.3),
                inset 15px 15px 30px rgba(219, 234, 254, 0.4);
            filter: blur(1px);
            opacity: 0.8;
        }

        /* Neumorphic Parthenon */
        .parthenon-container {
            position: absolute;
            bottom: 35%;
            left: 50%;
            transform: translateX(-50%);
            perspective: 1000px;
        }

        .parthenon {
            position: relative;
            width: 300px;
            height: 120px;
            background: linear-gradient(145deg,
                var(--sand-light) 0%,
                #f5f0e8 25%,
                rgba(255, 255, 255, 0.9) 50%,
                #f5f0e8 75%,
                var(--sand-dark) 100%);
            border-radius: 8px;
            box-shadow: 
                -15px -15px 30px rgba(255, 255, 255, 0.8),
                15px 15px 30px rgba(194, 178, 128, 0.4),
                inset -5px -5px 10px rgba(255, 255, 255, 0.6),
                inset 5px 5px 10px rgba(194, 178, 128, 0.2),
                0 25px 50px rgba(30, 58, 138, 0.2);
            transform: rotateX(5deg) rotateY(-2deg);
        }

        .parthenon::before {
            content: '';
            position: absolute;
            top: -20px;
            left: -10px;
            right: -10px;
            height: 25px;
            background: linear-gradient(145deg,
                rgba(255, 255, 255, 0.9) 0%,
                var(--sand-light) 50%,
                var(--sand-dark) 100%);
            border-radius: 4px;
            box-shadow: 
                -8px -8px 16px rgba(255, 255, 255, 0.6),
                8px 8px 16px rgba(194, 178, 128, 0.3);
        }

        .column {
            position: absolute;
            width: 12px;
            height: 80px;
            background: linear-gradient(90deg,
                rgba(245, 240, 232, 0.9) 0%,
                rgba(255, 255, 255, 0.95) 50%,
                rgba(228, 213, 183, 0.9) 100%);
            border-radius: 6px;
            bottom: 0;
            box-shadow: 
                -3px -3px 6px rgba(255, 255, 255, 0.8),
                3px 3px 6px rgba(194, 178, 128, 0.4),
                inset -2px -2px 4px rgba(255, 255, 255, 0.7),
                inset 2px 2px 4px rgba(194, 178, 128, 0.3);
        }

        .column:nth-child(1) { left: 20px; }
        .column:nth-child(2) { left: 45px; }
        .column:nth-child(3) { left: 70px; }
        .column:nth-child(4) { left: 95px; }
        .column:nth-child(5) { left: 120px; }
        .column:nth-child(6) { left: 145px; }
        .column:nth-child(7) { left: 170px; }
        .column:nth-child(8) { left: 195px; }
        .column:nth-child(9) { left: 220px; }
        .column:nth-child(10) { left: 245px; }

        /* Olive Trees with Neumorphic Effect */
        .olive-grove {
            position: absolute;
            bottom: 22%;
            width: 100%;
            height: 25%;
        }

        .olive-tree {
            position: absolute;
            width: 60px;
            height: 80px;
            background: radial-gradient(ellipse at center,
                var(--olive-light) 0%,
                var(--olive-medium) 40%,
                var(--olive-dark) 100%);
            border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
            box-shadow: 
                -8px -8px 16px rgba(168, 181, 98, 0.6),
                8px 8px 16px rgba(107, 124, 50, 0.4),
                inset -4px -4px 8px rgba(168, 181, 98, 0.5),
                inset 4px 4px 8px rgba(107, 124, 50, 0.3),
                0 15px 30px rgba(30, 58, 138, 0.15);
        }

        .olive-tree::after {
            content: '';
            position: absolute;
            bottom: -15px;
            left: 50%;
            transform: translateX(-50%);
            width: 8px;
            height: 20px;
            background: linear-gradient(180deg,
                var(--sand-dark) 0%,
                #8b6914 100%);
            border-radius: 4px;
            box-shadow: 
                -2px -2px 4px rgba(194, 178, 128, 0.5),
                2px 2px 4px rgba(139, 105, 20, 0.6);
        }

        .olive-tree:nth-child(1) { left: 10%; transform: scale(0.8); }
        .olive-tree:nth-child(2) { left: 25%; transform: scale(1.1); }
        .olive-tree:nth-child(3) { left: 75%; transform: scale(0.9); }
        .olive-tree:nth-child(4) { left: 85%; transform: scale(0.7); }

        /* Atmospheric Lighting */
        .sun-glow {
            position: absolute;
            top: 15%;
            right: 20%;
            width: 200px;
            height: 200px;
            background: radial-gradient(circle,
                rgba(255, 255, 255, 0.8) 0%,
                rgba(255, 248, 220, 0.6) 20%,
                rgba(255, 235, 180, 0.4) 40%,
                rgba(255, 218, 140, 0.2) 60%,
                transparent 80%);
            border-radius: 50%;
            filter: blur(2px);
            animation: sunPulse 8s infinite ease-in-out;
        }

        .light-rays {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                linear-gradient(145deg, transparent 40%, rgba(255, 255, 255, 0.1) 42%, rgba(255, 255, 255, 0.08) 44%, transparent 46%),
                linear-gradient(125deg, transparent 35%, rgba(255, 255, 255, 0.08) 37%, rgba(255, 255, 255, 0.06) 39%, transparent 41%),
                linear-gradient(155deg, transparent 50%, rgba(255, 255, 255, 0.06) 52%, rgba(255, 255, 255, 0.04) 54%, transparent 56%);
            animation: rayShift 20s infinite linear;
        }

        /* Sea/Coastline */
        .coastline {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 25%;
            background: linear-gradient(180deg,
                rgba(96, 165, 250, 0.7) 0%,
                rgba(59, 130, 246, 0.8) 50%,
                rgba(30, 58, 138, 0.9) 100%);
            box-shadow: 
                inset 0 20px 40px rgba(147, 197, 253, 0.3),
                inset 0 -10px 20px rgba(30, 58, 138, 0.4);
        }

        .coastline::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 30px;
            background: linear-gradient(90deg,
                transparent 0%,
                rgba(255, 255, 255, 0.4) 25%,
                rgba(255, 255, 255, 0.6) 50%,
                rgba(255, 255, 255, 0.4) 75%,
                transparent 100%);
            animation: waveShimmer 4s infinite ease-in-out;
        }

        /* Atmospheric Particles */
        .particle {
            position: absolute;
            width: 2px;
            height: 2px;
            background: rgba(255, 255, 255, 0.6);
            border-radius: 50%;
            animation: float 15s infinite ease-in-out;
            box-shadow: 0 0 4px rgba(255, 255, 255, 0.8);
        }

        .particle:nth-child(odd) { animation-delay: -7s; }
        .particle:nth-child(1) { left: 10%; top: 60%; animation-duration: 20s; }
        .particle:nth-child(2) { left: 30%; top: 40%; animation-duration: 18s; }
        .particle:nth-child(3) { left: 60%; top: 70%; animation-duration: 22s; }
        .particle:nth-child(4) { left: 80%; top: 50%; animation-duration: 19s; }
        .particle:nth-child(5) { left: 45%; top: 30%; animation-duration: 21s; }

        /* Animations */
        @keyframes cloudDrift {
            0% { transform: translateX(0); }
            100% { transform: translateX(-100px); }
        }

        @keyframes sunPulse {
            0%, 100% { opacity: 0.8; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.05); }
        }

        @keyframes rayShift {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes waveShimmer {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 0.8; }
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); opacity: 0.6; }
            25% { transform: translate(-10px, -15px) scale(1.1); opacity: 0.8; }
            50% { transform: translate(5px, -25px) scale(0.9); opacity: 1; }
            75% { transform: translate(10px, -10px) scale(1.05); opacity: 0.7; }
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .parthenon {
                width: 200px;
                height: 80px;
                bottom: 30%;
            }
            
            .column {
                width: 8px;
                height: 60px;
            }
            
            .sun-glow {
                width: 120px;
                height: 120px;
                top: 20%;
                right: 15%;
            }
        }

        @media (max-width: 480px) {
            .parthenon {
                width: 150px;
                height: 60px;
            }
            
            .column {
                width: 6px;
                height: 45px;
            }
            
            .olive-tree {
                width: 40px;
                height: 60px;
            }
        }
    </style>
</head>
<body>
    <div class="atmospheric-container">
        <!-- Atmospheric Layers -->
        <div class="atmosphere-layer"></div>
        
        <!-- Sun and Light Effects -->
        <div class="sun-glow"></div>
        <div class="light-rays"></div>
        
        <!-- Volumetric Clouds -->
        <div class="cloud-layer"></div>
        <div class="cloud-layer-2"></div>
        
        <!-- Mountain Ranges -->
        <div class="mountain-range-far"></div>
        <div class="mountain-range"></div>
        
        <!-- Neumorphic Parthenon -->
        <div class="parthenon-container">
            <div class="parthenon">
                <div class="column"></div>
                <div class="column"></div>
                <div class="column"></div>
                <div class="column"></div>
                <div class="column"></div>
                <div class="column"></div>
                <div class="column"></div>
                <div class="column"></div>
                <div class="column"></div>
                <div class="column"></div>
            </div>
        </div>
        
        <!-- Olive Grove -->
        <div class="olive-grove">
            <div class="olive-tree"></div>
            <div class="olive-tree"></div>
            <div class="olive-tree"></div>
            <div class="olive-tree"></div>
        </div>
        
        <!-- Coastline -->
        <div class="coastline"></div>
        
        <!-- Atmospheric Particles -->
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
    </div>
</body>
</html>
