name: Build & Deploy aegean-website

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  id-token: write   # OIDC federated auth to Azure
  contents: read

env:
  ACR_NAME: aegeanacr
  IMAGE_NAME: aegean-website
  RG_NAME: aegean-rg
  CONTAINERAPP_NAME: aegean-visions

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login (OIDC, no secrets)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Compute image tag
        id: tag
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          echo "tag=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "Image will be ${ACR_NAME}.azurecr.io/${IMAGE_NAME}:${SHORT_SHA}"

      - name: Build & push (ACR cloud build)
        run: |
          az acr build \
            --registry "$ACR_NAME" \
            --image "${IMAGE_NAME}:${{ steps.tag.outputs.tag }}" \
            --image "${IMAGE_NAME}:latest" \
            --file Dockerfile \
            .

      - name: Update Container App to new image
        run: |
          az containerapp update \
            --name "$CONTAINERAPP_NAME" \
            --resource-group "$RG_NAME" \
            --image "${ACR_NAME}.azurecr.io/${IMAGE_NAME}:${{ steps.tag.outputs.tag }}"

      - name: Show live FQDN
        run: |
          FQDN=$(az containerapp show \
            --name "$CONTAINERAPP_NAME" \
            --resource-group "$RG_NAME" \
            --query properties.configuration.ingress.fqdn -o tsv)
          echo "Live at: https://${FQDN}"
          echo "Wedding preview at: https://${FQDN}/weddings/  (login required)"
